##############################################################################
#  Multimodal Agent – Docker Compose
#  Run everything with:  docker compose up --build
##############################################################################


services:

  # ─────────────────────────────────────────────────────────────────────────
  #  BACKEND  –  FastAPI + Uvicorn  (port 8000)
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multimodal-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env           # all secret keys live here
    environment:
      # Override/supplement the .env values you want to change without
      # editing the file.  These take precedence over .env.
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      # Persist uploaded files between restarts
      - backend_uploads:/app/uploads
      # Hot-reload friendly: mount source code (comment out in production)
      # - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  # ─────────────────────────────────────────────────────────────────────────
  #  FRONTEND  –  Next.js  (port 3000)
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Backend URLs are baked into the Next.js bundle at build time.
        # When running locally both services are on localhost.
        # In production, replace with your real domain/IP.
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
        # Pulled from .env.frontend (or the shell environment)
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME}
        NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET}
    container_name: multimodal-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local     # NEXT_PUBLIC_* runtime vars
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s
    networks:
      - app-network


# ─────────────────────────────────────────────────────────────────────────────
#  VOLUMES
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  backend_uploads:
    name: multimodal_backend_uploads

# ─────────────────────────────────────────────────────────────────────────────
#  NETWORKS
# ─────────────────────────────────────────────────────────────────────────────
networks:
  app-network:
    name: multimodal_app_network
    driver: bridge
